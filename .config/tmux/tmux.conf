# ─── dotPi tmux.conf ──────────────────────────────────────────────────────────

# ─── terminal ─────────────────────────────────────────────────────────────────
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"
set -g mouse on
set -sg escape-time 10            # faster vim mode switches
set -g focus-events on            # vim auto-read / git-gutter etc.
set -g history-limit 50000

# ─── prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ─── reload config ────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# ─── windows / panes ──────────────────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# vim-style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# splits preserve cwd
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"
bind c  new-window        -c "#{pane_current_path}"

# alt-arrow: switch panes without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# shift-arrow / M-H/L: switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n M-H     previous-window
bind -n M-L     next-window

# ─── copy mode (vi) ───────────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# ─── theme options ────────────────────────────────────────────────────────────
set -g @catppuccin_flavour 'mocha'
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_window_id_style dsquare
set -g @tokyo-night-tmux_show_git 0

# ─── plugins ──────────────────────────────────────────────────────────────────
# TPM in XDG path (~/.config/tmux/plugins) — set explicitly
setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save every 15min

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# auto-install TPM on first run (so a fresh machine boots tmux cleanly)
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone --depth=1 https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
