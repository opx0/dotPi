"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
format = """$directory$character"""
right_format = """$all"""
palette = "catppuccin_mocha"
command_timeout = 1000

[character]
success_symbol = '[➜](bold green)'
error_symbol   = '[✗](bold red)'
vicmd_symbol   = '[N](bold yellow)'

[directory]
truncation_length = 3
truncation_symbol = '…/'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = ' '
style  = 'bold mauve'

[git_status]
style = 'bold red'

[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true

[golang]
symbol = ' '
format = '[$symbol($version)]($style) '
style  = 'bold cyan'

[nodejs]
symbol = ' '
format = '[$symbol($version)]($style) '
style  = 'bold green'

[python]
symbol = ' '
format = '[$symbol($version)]($style) '
style  = 'bold yellow'

[rust]
symbol = ' '
format = '[$symbol($version)]($style) '
style  = 'bold red'

[c]
symbol = ' '
format = '[$symbol($version)]($style) '
style  = 'bold blue'

[time]
disabled = false
time_format = '%R'
format = '[$time]($style) '
style = 'bold lavender'

[cmd_duration]
min_time = 2000
format = '[took $duration]($style) '
style = 'bold yellow'

# ─── palettes ─────────────────────────────────────────────────────────────────
